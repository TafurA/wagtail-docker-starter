services:

  django:
    container_name: django_container
    build: 
      context: .
      dockerfile: docker/django/Dockerfile
    image: wagtail_container:devel
    env_file:
      - ./.env
      - ./docker/django/.env
    ports:
      - "8000:8000/tcp"
      - "8888:8888/tcp"
    stdin_open: true
    tty: true
    volumes:
      - .:/app  # Monta todo el proyecto
      - /app/node_modules  # Excluye node_modules
    command: python manage.py runserver 0.0.0.0:8000  # Asegura autoreload

  postgres:
    container_name: postgres
    image: postgres:14-alpine
    env_file:
      - ./docker/postgres/.env
    volumes:
      - postgres_data.devel:/var/lib/postgresql/data
    ports:
      - "5432:5432/tcp"

  nginx:
    container_name: nginx_container
    image: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/certificate.crt:/etc/nginx/certs/certificate.crt:ro
      - ./certs/private_key.key:/etc/nginx/certs/private_key.key:ro
    depends_on:
      - django
    
  vite:
    container_name: vite_container
    build:
      context: .
      dockerfile: ./docker/node/Dockerfile
    image: vite_container:devel
    volumes:
      - ./:/usr/app
      - /usr/app/node_modules
    ports:
      - "3000:3000"
      - "9000:9000"
    stdin_open: true
    tty: true

volumes:
  postgres_data.devel:
